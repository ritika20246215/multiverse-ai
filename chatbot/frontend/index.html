<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot</title>
    <style>
        /* ============================================
           CSS VARIABLES & RESET
           ============================================ */
        :root {
            --primary-color: #6366f1;
            --primary-hover: #4f46e5;
            --bg-color: #f8fafc;
            --chat-bg: #ffffff;
            --user-msg-bg: #6366f1;
            --user-msg-text: #ffffff;
            --bot-msg-bg: #f1f5f9;
            --bot-msg-text: #1e293b;
            --border-color: #e2e8f0;
            --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --radius: 16px;
            --radius-sm: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--bg-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* ============================================
           CHAT CONTAINER - Main wrapper
           ============================================ */
        .chat-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 9999;
            font-family: inherit;
        }

        /* ============================================
           TOGGLE BUTTON - Opens/closes chat
           ============================================ */
        .chat-toggle {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-color), var(--primary-hover));
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-sm);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: absolute;
            bottom: 0;
            right: 0;
        }

        .chat-toggle:hover {
            transform: scale(1.1);
            box-shadow: var(--shadow);
        }

        .chat-toggle svg {
            width: 28px;
            height: 28px;
            fill: white;
            transition: transform 0.3s ease;
        }

        .chat-toggle.active svg {
            transform: rotate(90deg);
        }

        /* ============================================
           CHAT WINDOW - The main chat interface
           ============================================ */
        .chat-window {
            position: absolute;
            bottom: 80px;
            right: 0;
            width: 380px;
            height: 550px;
            background: var(--chat-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            opacity: 0;
            visibility: hidden;
            transform: translateY(20px) scale(0.95);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .chat-window.open {
            opacity: 1;
            visibility: visible;
            transform: translateY(0) scale(1);
        }

        /* ============================================
           CHAT HEADER - Title and status
           ============================================ */
        .chat-header {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-hover));
            color: white;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-header-avatar {
            width: 44px;
            height: 44px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .chat-header-info h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .chat-header-info p {
            font-size: 12px;
            opacity: 0.9;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* ============================================
           MESSAGES AREA - Chat history display
           ============================================ */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: var(--bg-color);
        }

        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }

        /* ============================================
           MESSAGE BUBBLES - Individual messages
           ============================================ */
        .message {
            display: flex;
            gap: 10px;
            max-width: 85%;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message.bot {
            align-self: flex-start;
        }

        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .message.user .message-avatar {
            background: var(--primary-color);
            color: white;
        }

        .message.bot .message-avatar {
            background: var(--border-color);
        }

        .message-content {
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            line-height: 1.5;
            font-size: 14px;
            word-wrap: break-word;
        }

        .message.user .message-content {
            background: var(--user-msg-bg);
            color: var(--user-msg-text);
            border-bottom-right-radius: 4px;
        }

        .message.bot .message-content {
            background: var(--bot-msg-bg);
            color: var(--bot-msg-text);
            border-bottom-left-radius: 4px;
        }

        /* ============================================
           TYPING INDICATOR - Shows bot is thinking
           ============================================ */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 8px 0;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #94a3b8;
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-8px); }
        }

        /* ============================================
           INPUT AREA - Where users type messages
           ============================================ */
        .chat-input-area {
            padding: 16px;
            background: var(--chat-bg);
            border-top: 1px solid var(--border-color);
        }

        .chat-input-wrapper {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .chat-input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid var(--border-color);
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-family: inherit;
            resize: none;
            outline: none;
            transition: border-color 0.2s ease;
            max-height: 120px;
            min-height: 46px;
        }

        .chat-input:focus {
            border-color: var(--primary-color);
        }

        .chat-input::placeholder {
            color: #94a3b8;
        }

        .chat-send {
            width: 46px;
            height: 46px;
            background: var(--primary-color);
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s ease, transform 0.1s ease;
            flex-shrink: 0;
        }

        .chat-send:hover {
            background: var(--primary-hover);
        }

        .chat-send:active {
            transform: scale(0.95);
        }

        .chat-send:disabled {
            background: var(--border-color);
            cursor: not-allowed;
        }

        .chat-send svg {
            width: 20px;
            height: 20px;
            fill: white;
        }

        /* ============================================
           RESPONSIVE DESIGN - Mobile adjustments
           ============================================ */
        @media (max-width: 480px) {
            .chat-container {
                bottom: 16px;
                right: 16px;
                left: 16px;
            }

            .chat-window {
                width: 100%;
                height: calc(100vh - 120px);
                max-height: 600px;
                bottom: 76px;
                right: 0;
            }

            .chat-toggle {
                width: 56px;
                height: 56px;
            }
        }

        /* ============================================
           DEMO PAGE STYLES - For standalone testing
           ============================================ */
        .demo-content {
            text-align: center;
            max-width: 600px;
            padding: 40px 20px;
        }

        .demo-content h1 {
            font-size: 2.5rem;
            color: #1e293b;
            margin-bottom: 16px;
        }

        .demo-content p {
            color: #64748b;
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .demo-content .arrow {
            position: fixed;
            bottom: 100px;
            right: 100px;
            font-size: 2rem;
            animation: bounce 1s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>
    <div class="demo-content">
        <h1>AI Chatbot Demo</h1>
        <p>Click the chat button in the bottom-right corner to start a conversation with our AI assistant.</p>
        <div class="arrow">-></div>
    </div>

    <div class="chat-container" id="chatContainer">
        <button class="chat-toggle" id="chatToggle" aria-label="Toggle chat">
            <svg viewBox="0 0 24 24" id="chatIcon">
                <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"></path>
            </svg>
            <svg viewBox="0 0 24 24" id="closeIcon" style="display: none;">
                <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"></path>
            </svg>
        </button>

        <div class="chat-window" id="chatWindow">
            <div class="chat-header">
                <div class="chat-header-avatar">AI</div>
                <div class="chat-header-info">
                    <h3>AI Assistant</h3>
                    <p><span class="status-dot"></span> Online • Ready to help</p>
                </div>
            </div>

            <div class="chat-messages" id="chatMessages">
                <div class="message bot">
                    <div class="message-avatar">AI</div>
                    <div class="message-content">
                        Hi there! I'm your AI assistant. How can I help you today?
                    </div>
                </div>
            </div>

            <div class="chat-input-area">
                <div class="chat-input-wrapper">
                    <textarea
                        class="chat-input"
                        id="chatInput"
                        placeholder="Type your message..."
                        rows="1"
                    ></textarea>
                    <button class="chat-send" id="chatSend" aria-label="Send message">
                        <svg viewBox="0 0 24 24">
                            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        /*
          AI Chatbot Widget
          A complete, self-contained chatbot implementation
        */
        (function () {
            "use strict";

            const CONFIG = {
                apiUrl: "http://localhost:3000/chat",
                maxHistoryLength: 10,
                typingDelay: 500
            };

            let chatHistory = [];
            let isWaitingForResponse = false;

            const elements = {
                container: document.getElementById("chatContainer"),
                toggle: document.getElementById("chatToggle"),
                window: document.getElementById("chatWindow"),
                messages: document.getElementById("chatMessages"),
                input: document.getElementById("chatInput"),
                send: document.getElementById("chatSend"),
                chatIcon: document.getElementById("chatIcon"),
                closeIcon: document.getElementById("closeIcon")
            };

            function escapeHtml(text) {
                const div = document.createElement("div");
                div.textContent = text;
                return div.innerHTML;
            }

            function scrollToBottom() {
                elements.messages.scrollTo({
                    top: elements.messages.scrollHeight,
                    behavior: "smooth"
                });
            }

            function autoResizeInput() {
                elements.input.style.height = "auto";
                elements.input.style.height = Math.min(elements.input.scrollHeight, 120) + "px";
            }

            function addMessage(content, sender) {
                const messageDiv = document.createElement("div");
                messageDiv.className = `message ${sender}`;

                const avatar = sender === "user" ? "You" : "AI";

                messageDiv.innerHTML = `
                    <div class="message-avatar">${avatar}</div>
                    <div class="message-content">${escapeHtml(content)}</div>
                `;

                elements.messages.appendChild(messageDiv);
                scrollToBottom();

                chatHistory.push({
                    role: sender === "user" ? "user" : "assistant",
                    content
                });

                if (chatHistory.length > CONFIG.maxHistoryLength) {
                    chatHistory = chatHistory.slice(-CONFIG.maxHistoryLength);
                }
            }

            function showTypingIndicator() {
                const typingDiv = document.createElement("div");
                typingDiv.className = "message bot";
                typingDiv.id = "typingIndicator";
                typingDiv.innerHTML = `
                    <div class="message-avatar">AI</div>
                    <div class="message-content">
                        <div class="typing-indicator">
                            <span></span>
                            <span></span>
                            <span></span>
                        </div>
                    </div>
                `;
                elements.messages.appendChild(typingDiv);
                scrollToBottom();
            }

            function hideTypingIndicator() {
                const indicator = document.getElementById("typingIndicator");
                if (indicator) {
                    indicator.remove();
                }
            }

            async function sendToAPI(userMessage) {
                try {
                    const response = await fetch(CONFIG.apiUrl, {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            message: userMessage,
                            history: chatHistory.slice(0, -1)
                        })
                    });

                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }

                    const data = await response.json();
                    return data.reply;
                } catch (error) {
                    console.error("API Error:", error);
                    return "I'm sorry, I'm having trouble connecting right now. Please try again in a moment.";
                }
            }

            async function handleSend() {
                const message = elements.input.value.trim();

                if (!message || isWaitingForResponse) {
                    return;
                }

                elements.input.value = "";
                elements.input.style.height = "auto";

                addMessage(message, "user");

                isWaitingForResponse = true;
                elements.send.disabled = true;
                elements.input.disabled = true;

                const typingTimer = window.setTimeout(showTypingIndicator, CONFIG.typingDelay);
                const botReply = await sendToAPI(message);
                window.clearTimeout(typingTimer);

                hideTypingIndicator();
                addMessage(botReply, "bot");

                isWaitingForResponse = false;
                elements.send.disabled = false;
                elements.input.disabled = false;
                elements.input.focus();
            }

            function toggleChat() {
                const isOpen = elements.window.classList.toggle("open");
                elements.toggle.classList.toggle("active", isOpen);
                elements.chatIcon.style.display = isOpen ? "none" : "block";
                elements.closeIcon.style.display = isOpen ? "block" : "none";

                if (isOpen) {
                    window.setTimeout(() => elements.input.focus(), 300);
                }
            }

            elements.toggle.addEventListener("click", toggleChat);
            elements.send.addEventListener("click", handleSend);

            elements.input.addEventListener("keydown", (event) => {
                if (event.key === "Enter" && !event.shiftKey) {
                    event.preventDefault();
                    handleSend();
                }
            });

            elements.input.addEventListener("input", autoResizeInput);

            console.log("AI Chatbot initialized");
        })();
    </script>
</body>
</html>
